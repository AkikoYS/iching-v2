<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>易経</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.7.4/lottie.min.js"></script>
</head>
<body>

  <!-- Screen 1: Spinner -->
  <div id="screen-spin" class="screen active">
    <p id="guide" class="guide">タップして易を立てる</p>
    <div id="spinner-wrap" role="button" aria-label="スピナーをタップ">
      <div id="lottie-el"></div>
    </div>
    <div id="yao-stack">
      <!-- 爻は上から表示するため line 6→1 の順 -->
      <div class="yao" data-line="6"></div>
      <div class="yao" data-line="5"></div>
      <div class="yao" data-line="4"></div>
      <div class="yao" data-line="3"></div>
      <div class="yao" data-line="2"></div>
      <div class="yao" data-line="1"></div>
    </div>
  </div>

  <!-- Screen 2: Result -->
  <div id="screen-result" class="screen">
    <div id="result-card"></div>
    <button id="btn-again">もう一度占う</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
