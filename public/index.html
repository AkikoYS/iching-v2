<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>易経</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.7.4/lottie.min.js"></script>
</head>
<body>

  <!-- ① スピナー画面 -->
  <div id="screen-spin" class="screen active">
    <p id="guide" class="guide">タップして易を立てる</p>
    <div id="spinner-wrap" role="button" aria-label="スピナー">
      <div id="lottie-target"></div>
    </div>
    <div id="hex-build">
      <div class="hex-slot" data-line="6"></div>
      <div class="hex-slot" data-line="5"></div>
      <div class="hex-slot" data-line="4"></div>
      <div class="hex-slot" data-line="3"></div>
      <div class="hex-slot" data-line="2"></div>
      <div class="hex-slot" data-line="1"></div>
    </div>
  </div>

  <!-- ② 結果画面 -->
  <div id="screen-result" class="screen">
    <div id="result-inner"></div>
    <button id="btn-reset" class="btn-ghost">もう一度占う</button>
  </div>

  <script src="core/data.js"></script>
  <script src="core/reading.js"></script>
  <script src="ui/spinner.js"></script>
  <script src="ui/result.js"></script>
  <script src="app.js"></script>
</body>
</html>
